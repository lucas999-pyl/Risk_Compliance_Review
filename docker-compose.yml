services:
  api:
    build: .
    ports:
      - "8888:8888"
    environment:
      RCR_DATABASE_PATH: /app/data/risk-review.db
      RCR_STORAGE_DIR: /app/data/objects
      RCR_ENABLE_LLM: "false"
      OPENAI_API_BASE: http://litellm:4000/v1
      CHEM_RAG_EMBEDDING_PROVIDER: qwen
      CHEM_RAG_EMBEDDING_MODEL: text-embedding-v4
      CHEM_RAG_LLM_PROVIDER: qwen
      CHEM_RAG_LLM_MODEL: qwen3.6-plus
      CHEM_RAG_VECTOR_STORE_DIR: /app/data/vector_store/chemical_rag
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - minio

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rcr
      POSTGRES_PASSWORD: rcr
      POSTGRES_DB: risk_compliance_review
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["llm"]
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: sk-local-dev
